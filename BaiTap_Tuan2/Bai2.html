<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">Tính</button>
    <script>
        var btn  = document.getElementById("btn")
        btn.onclick = () =>{
            var bills = [275, 40, 430]
            const TinhTip = (bill) =>{
                return bill >= 50 && bill <= 300 ? bill *0.15 : bill * 0.2
            }
            var tips = bills.map(bill => TinhTip(bill)); 
            var Tong = bills.map((bill, i) => bill + tips[i]) ;

            console.log(`Bills: ${bills} , Tips: ${tips} , Tong : ${Tong}`) ;
        }
</script>
    
</body>
</html>

    <script>
        const Mark ={
            fullName: "Mark Miller", 
            mass: 60 , 
            height : 1.69 ,
            TinhBMI : function(){
                 this.BMI = this.mass/ (this.height * this.height)
                return this.BMI ; 
            } 
        }

        const John = {
            fullName: "John Smith",
            mass: 60 , 
            height: 1.95,

            TinhBMI : function(){
                 this.BMI = this.mass / (this.height * this.height)
                return this.BMI
            }
        }  
        Mark.TinhBMI(); 
        John.TinhBMI();
        if(Mark.BMI > John.BMI){
            console.log(`${Mark.fullName} co BMI cao hon ${John.fullName} `)
        } else if (John.BMI > Mark.BMI){
            console.log(`${John.fullName} co BMI cao hon ${Mark.fullName} `)
        } else {
            console.log("Hai nguoi co BMI bang nhau")
        }



    </script>
